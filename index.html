<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love for Marylyn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-background"></div>
    <div id="opening-screen" class="screen active">
        <div class="hearts-background"></div>
        <div class="content">
            <h1 class="glowing-text">Marylyn, this is something special just for you ❤️</h1>
            <button id="see-heart-btn" class="btn">Click to See My Heart</button>
        </div>
    </div>

    <div id="heart-screen" class="screen">
        <div class="large-heart">
            <span class="heart-text">Marylyn ❤️ Bee Mun</span>
        </div>
    </div>

    <div id="message-screen" class="screen">
        <div class="message-container">
            <p id="love-message"></p>
        </div>
        <button id="surprise-btn" class="btn">Press if you want to know how much I love you</button>
    </div>

    <div id="surprise-screen" class="screen">
        <div class="hearts-explosion"></div>
        <div class="surprise-message">To Infinity and Beyond (Nekusingaperi)❤️</div>
    </div>

    <footer class="final-message">
        Made with love by Bee Mun
    </footer>

    <script src="script.js"></script>
</body>
</html>
